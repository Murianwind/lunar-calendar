<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>음력 달력 구글 연동</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .input-group { margin-bottom: 10px; }
        .helper-links { margin-bottom: 15px; font-size: 0.85em; }
        .helper-links a { color: #1a73e8; text-decoration: none; margin-right: 10px; }
        label { display: inline-block; width: 120px; }
        input[type="text"], input[type="number"] { padding: 5px; width: 200px; }
        /* 월, 일 입력칸 전용 스타일 */
        .date-input { width: 60px !important; }
        button { padding: 10px 15px; cursor: pointer; margin-right: 5px; }
        #previewList { background: #f4f4f4; padding: 15px; margin-top: 10px; border-radius: 5px; max-height: 200px; overflow-y: auto; }
        .delete-section { margin-top: 40px; padding: 20px; border: 1px solid #ccc; background: #fff8f8; }
        #searchResultList { margin: 10px 0; font-size: 0.9em; color: #555; }
    </style>
</head>
<body>

    <h2>음력 일정 구글 캘린더 등록</h2>
    
    <div class="helper-links">
        <a href="https://console.cloud.google.com/apis/credentials" target="_blank">🔗 인증정보 확인</a>
        <a href="https://console.cloud.google.com/apis/library/calendar-json.googleapis.com" target="_blank">📅 API 활성화</a>
        <a href="https://console.cloud.google.com/apis/credentials/consent" target="_blank">👤 테스트 사용자</a>
    </div>

    <div class="input-group">
        <label>Google Client ID</label>
        <input type="text" id="clientId" placeholder="숫자-문자.apps.googleusercontent.com">
    </div>
    <div class="input-group">
        <label>Google API Key</label>
        <input type="text" id="apiKey" placeholder="AIzaSy...">
    </div>

    <hr>

    <div class="input-group">
        <label>일정 제목</label>
        <input type="text" id="eventTitle" value="오름이 생일(음력)">
    </div>
    <div class="input-group">
        <label>음력 날짜</label>
        <input type="number" id="lunarMonth" class="date-input" min="1" max="12" value="1" placeholder="월">
        <input type="number" id="lunarDay" class="date-input" min="1" max="31" value="1" placeholder="일">
        <label style="width: auto; margin-left: 10px;"><input type="checkbox" id="isLeap"> 윤달</label>
    </div>
    <div class="input-group">
        <label>반복 횟수(년)</label>
        <input type="number" id="repeatYears" value="10" min="1" max="50">
    </div>
    <div class="input-group">
        <label>설명(태그)</label>
        <input type="text" id="eventDescription" placeholder="예: #가족생일 (삭제 시 검색용)">
    </div>

    <button id="previewBtn">양력 변환 및 미리보기</button>
    <button id="syncBtn" style="background-color: #4285f4; color: white; border: none;">구글 캘린더에 일괄 등록</button>

    <div id="previewList">등록될 날짜가 여기에 표시됩니다.</div>

    <div class="delete-section">
        <h3>일정 일괄 삭제</h3>
        <p style="font-size: 0.9em; color: #666;">등록 시 사용한 키워드로 검색하여 삭제합니다.</p>
        <input type="text" id="deleteKeyword" placeholder="검색 키워드 입력">
        <button id="searchBtn">일정 찾기</button>
        <div id="searchResultList"></div>
        <button id="bulkDeleteBtn" style="display:none; background-color: #d93025; color: white; border: none;">모든 검색 결과 삭제</button>
    </div>

    <script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
    <script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
    <script src="https://cdn.jsdelivr.net/npm/korean-lunar-calendar@0.1.2/dist/korean-lunar-calendar.min.js"></script>
    <script src="./js/calendar.js"></script>
    <script src="./js/auth.js"></script>
    <script src="./js/main.js"></script>
</body>
</html>
