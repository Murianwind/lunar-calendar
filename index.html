<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>음력 일정 자동 등록기</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 50px; }
        .container { max-width: 600px; }
        .card { border-radius: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h2 class="text-center mb-4">🌙 음력 일정 자동 등록기</h2>
        
        <div class="card p-4 mb-4 border-warning shadow-sm">
            <h5 class="text-warning">⚙️ 개인 API 설정</h5>
            <p class="small text-muted">Google Cloud Console에서 발급받은 본인의 키를 입력하세요.</p>
            <input type="text" id="clientId" class="form-control mb-2" placeholder="Google Client ID">
            <input type="password" id="apiKey" class="form-control" placeholder="Google API Key">
        </div>

        <div class="card p-4 shadow-sm mb-4">
            <div class="mb-3">
                <label class="form-label font-weight-bold">일정 제목</label>
                <input type="text" id="eventTitle" class="form-control" placeholder="예: 어머니 생신">
            </div>
            
            <label class="form-label font-weight-bold">음력 날짜 입력</label>
            <div class="row g-2 mb-3">
                <div class="col-4">
                    <input type="number" id="lunarYear" class="form-control" placeholder="년(YYYY)" value="1990">
                </div>
                <div class="col-4">
                    <input type="number" id="lunarMonth" class="form-control" placeholder="월" value="1" min="1" max="12">
                </div>
                <div class="col-4">
                    <input type="number" id="lunarDay" class="form-control" placeholder="일" value="1" min="1" max="31">
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-6 d-flex align-items-center">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="isLeap">
                        <label class="form-check-label" for="isLeap">윤달 여부</label>
                    </div>
                </div>
                <div class="col-6">
                    <input type="number" id="repeatYears" class="form-control" placeholder="반복 횟수(년)" value="10">
                </div>
            </div>
            
            <button id="convertBtn" class="btn btn-primary w-100">양력 변환 및 미리보기</button>
        </div>

        <div id="previewSection" class="d-none">
            <div class="card p-4 shadow-sm">
                <h5 class="mb-3">📅 변환된 양력 날짜 목록</h5>
                <ul id="dateList" class="list-group mb-3"></ul>
                <button id="syncBtn" class="btn btn-success w-100">구글 캘린더에 일괄 등록</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/korean-lunar-calendar@0.1.4/dist/korean-lunar-calendar.min.js"></script>
    <script src="./js/calendar.js"></script>
    <script src="./js/auth.js"></script>
    <script src="./js/main.js"></script>
</body>
</html>
