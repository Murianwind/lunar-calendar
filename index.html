<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>음력 일정 등록기 (Open Source)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body { background-color: #f4f7f6; }</style>
</head>
<body>
    <div class="container py-5" style="max-width: 650px;">
        <h2 class="text-center mb-4">🌙 음력 일정 자동 등록기</h2>
        
        <div class="card p-4 mb-4 border-warning shadow-sm">
            <h5 class="text-warning">⚙️ 개인 API 설정</h5>
            <p class="small text-muted">GitHub 소스 코드를 복제한 후, 본인의 API 키를 입력해야 작동합니다.</p>
            <input type="text" id="clientId" class="form-control mb-2" placeholder="Google Client ID">
            <input type="password" id="apiKey" class="form-control" placeholder="Google API Key">
        </div>

        <div class="card p-4 shadow-sm mb-4">
            <input type="text" id="eventTitle" class="form-control mb-3" placeholder="일정 제목 (예: 생신)">
            <div class="row g-2 mb-3">
                <div class="col-4"><input type="number" id="lunarMonth" class="form-control" placeholder="월" value="1" min="1" max="12"></div>
                <div class="col-4"><input type="number" id="lunarDay" class="form-control" placeholder="일" value="1" min="1" max="31"></div>
                <div class="col-4 d-flex align-items-center justify-content-center">
                    <input type="checkbox" id="isLeap" class="form-check-input me-2"> <label for="isLeap">윤달</label>
                </div>
            </div>
            <button id="convertBtn" class="btn btn-primary w-100">양력 변환 및 미리보기</button>
        </div>

        <div id="previewSection" class="d-none">
            <ul id="dateList" class="list-group mb-3"></ul>
            <button id="syncBtn" class="btn btn-success w-100">구글 캘린더 등록 시작</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/korean-lunar-calendar@0.1.4/dist/korean-lunar-calendar.min.js"></script>
    <script src="js/calendar.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
